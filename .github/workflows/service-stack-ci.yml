name: Service Stack CI

on:
  push:
    paths:
      - "projects/devops-service-stack/**"
      - ".github/workflows/service-stack-ci.yml"
  pull_request:
    paths:
      - "projects/devops-service-stack/**"
      - ".github/workflows/service-stack-ci.yml"

jobs:
  validate:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: projects/devops-service-stack

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: node -c src/server.js && node -c src/app.js

      - name: Docker build
        run: docker build -t devops-service-stack:test .
