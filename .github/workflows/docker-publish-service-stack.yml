name: Publish Service Stack Image

on:
  push:
    branches:
      - main
      - master
    paths:
      - "projects/devops-service-stack/**"
      - ".github/workflows/docker-publish-service-stack.yml"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: projects/devops-service-stack

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert repository name to lowercase
        id: repo
        run: echo "repo=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: meta
        run: |
          echo "sha_tag=ghcr.io/${{ steps.repo.outputs.repo }}/devops-service-stack:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=ghcr.io/${{ steps.repo.outputs.repo }}/devops-service-stack:latest" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker build \
            -t "${{ steps.meta.outputs.sha_tag }}" \
            -t "${{ steps.meta.outputs.latest_tag }}" \
            .

      - name: Push image
        run: |
          docker push "${{ steps.meta.outputs.sha_tag }}"
          docker push "${{ steps.meta.outputs.latest_tag }}"
